<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Todo App</title>
   <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:300,400,700">
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <!--TODO: 2.1.БЭМ Используйте нотацию БЭМ для формирования имен классов.  -->
<section class="container-eisenhower">
   <img alt="eisenhower-matrix" src="./eisenhower-matrix.jpg">
   <a class="more-inf" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
</section>
<!-- TODO: 2.5. HTML-перенос строк, Разбейте длинные строки на несколько строк. -->
<section class="list-cases">
   <div id="add-item">
      <label for="new-task">Add Item</label>
      <div class="tasks-wrap">
         <input id="new-task" class="task" type="text">
         <button>Add</button>
      </div>
   </div>
   <p>Todo</p>
   <ul id="incompleteTasks">
      <li>
         <input type="checkbox">
         <label class="task">Pay Bills</label>
         <input type="text" class="task">
         <button class="edit">Edit</button>
         <button class="delete">
            <img alt="remove" src="./remove.svg">
         </button>
      </li>
      <li class="edit-mode">
         <input type="checkbox">
         <label class="task">Go Shopping</label>
         <input type="text" value="Go Shopping" class="task">
         <button class="edit">Save</button>
         <button class="delete">
            <img alt="remove" src="./remove.svg">
         </button>
      </li>
   </ul>
   <p>Completed</p>
   <ul id="completed-tasks">
      <li>
         <input type="checkbox" checked>
         <label class="task">See the Doctor</label>
         <input type="text" class="task">
         <button class="edit">Edit</button>
         <button class="delete">
            <img alt="remove" src="./remove.svg">
         </button>
      </li>
   </ul>
</section>
<script src="app.js"></script>
</body>
</html>
